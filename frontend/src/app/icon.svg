<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#0080ff" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="#0A0A10" />
  <rect width="504" height="504" x="4" y="4" rx="124" fill="none" stroke="url(#grad)" stroke-width="8" stroke-opacity="0.4" />
  <!-- Dynamic Audio Waveform Bars -->
  <rect x="120" y="200" width="40" height="112" rx="20" fill="url(#grad)" filter="url(#glow)" />
  <rect x="184" y="136" width="40" height="240" rx="20" fill="url(#grad)" filter="url(#glow)" />
  <rect x="248" y="80" width="40" height="352" rx="20" fill="url(#grad)" filter="url(#glow)" />
  <rect x="312" y="152" width="40" height="208" rx="20" fill="url(#grad)" filter="url(#glow)" />
  <rect x="376" y="216" width="40" height="80" rx="20" fill="url(#grad)" filter="url(#glow)" />
</svg>
